name: Build Release Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            build_script: build:ci:mac
            artifact_name: popmind-macos

    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate macOS signing secrets
        if: matrix.os == 'macos-latest'
        run: |
          if [ -z "${CSC_LINK:-}" ] || [ -z "${CSC_KEY_PASSWORD:-}" ]; then
            echo "Missing macOS signing secrets. Configure CSC_LINK and CSC_KEY_PASSWORD before publishing macOS packages." >&2
            exit 1
          fi

      - name: Build installer package
        run: pnpm run ${{ matrix.build_script }}

      - name: Verify macOS app signature
        if: matrix.os == 'macos-latest'
        run: |
          codesign --verify --deep --strict --verbose=4 dist/mac-arm64/popMind.app
          codesign -dvvv dist/mac-arm64/popMind.app 2>&1 | tee /tmp/popmind-app-signature.txt
          codesign -dvvv "dist/mac-arm64/popMind.app/Contents/Frameworks/Electron Framework.framework/Versions/A/Electron Framework" 2>&1 | tee /tmp/popmind-framework-signature.txt
          grep -E 'Identifier=|Signature=|TeamIdentifier=' /tmp/popmind-app-signature.txt
          grep -E 'Identifier=|Signature=|TeamIdentifier=' /tmp/popmind-framework-signature.txt
          ! grep -qi 'Signature=adhoc' /tmp/popmind-app-signature.txt
          ! grep -qi 'Signature=adhoc' /tmp/popmind-framework-signature.txt
          grep -Eq 'TeamIdentifier=[A-Z0-9]+' /tmp/popmind-app-signature.txt
          grep -Eq 'TeamIdentifier=[A-Z0-9]+' /tmp/popmind-framework-signature.txt
          codesign -d --entitlements :- "dist/mac-arm64/popMind.app/Contents/MacOS/popMind" 2>&1 | grep 'com.apple.security.cs.disable-library-validation'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            dist/*.pkg
            dist/*.zip
            dist/*.yml
            dist/*.yaml
            dist/*.blockmap

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-artifacts/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release-artifacts/* --generate-notes --verify-tag
          fi
