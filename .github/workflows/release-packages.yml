name: Build Release Packages

on:
  workflow_dispatch:
    inputs:
      allow_unsigned_mac:
        description: Build an unsigned macOS package when signing secrets are unavailable
        required: false
        default: true
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    outputs:
      mac_signed: ${{ steps.signing_mode.outputs.signed || 'false' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            build_script: build:ci:mac
            artifact_name: popmind-macos

    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve macOS signing mode
        id: signing_mode
        if: matrix.os == 'macos-latest'
        env:
          ALLOW_UNSIGNED_MAC: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_unsigned_mac || 'true' }}
        run: |
          if [ -n "${CSC_LINK:-}" ] && [ -n "${CSC_KEY_PASSWORD:-}" ]; then
            echo "mode=signed" >> "$GITHUB_OUTPUT"
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "Using Developer ID signing secrets."
            exit 0
          fi

          if [ "${ALLOW_UNSIGNED_MAC}" = "true" ]; then
            echo "mode=unsigned" >> "$GITHUB_OUTPUT"
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "Signing secrets are missing. Building an unsigned macOS package for testing only."
            exit 0
          fi

          echo "Missing macOS signing secrets. Configure CSC_LINK and CSC_KEY_PASSWORD, or run workflow_dispatch with allow_unsigned_mac=true." >&2
          exit 1

      - name: Build installer package
        run: |
          run_build() {
            if [ "${{ steps.signing_mode.outputs.signed }}" = "true" ]; then
              pnpm run ${{ matrix.build_script }}
            else
              env -u CSC_LINK -u CSC_KEY_PASSWORD -u APPLE_TEAM_ID CSC_IDENTITY_AUTO_DISCOVERY=false pnpm run ${{ matrix.build_script }}
            fi
          }

          attempt=1
          until run_build; do
            if [ "$attempt" -ge 3 ]; then
              echo "Build failed after ${attempt} attempts." >&2
              exit 1
            fi

            attempt=$((attempt + 1))
            echo "Build failed, retrying in 5 seconds (attempt ${attempt}/3)..."
            sleep 5
          done

      - name: Warn about unsigned macOS package
        if: matrix.os == 'macos-latest' && steps.signing_mode.outputs.signed != 'true'
        run: |
          echo "Unsigned macOS package built."
          echo "This artifact is for local testing only and may lose Accessibility / Screen Recording permission trust after reinstall."

      - name: Verify macOS app signature
        if: matrix.os == 'macos-latest' && steps.signing_mode.outputs.signed == 'true'
        run: |
          codesign --verify --deep --strict --verbose=4 dist/mac-arm64/popMind.app
          codesign -dvvv dist/mac-arm64/popMind.app 2>&1 | tee /tmp/popmind-app-signature.txt
          codesign -dvvv "dist/mac-arm64/popMind.app/Contents/Frameworks/Electron Framework.framework/Versions/A/Electron Framework" 2>&1 | tee /tmp/popmind-framework-signature.txt
          grep -E 'Identifier=|Signature=|TeamIdentifier=' /tmp/popmind-app-signature.txt
          grep -E 'Identifier=|Signature=|TeamIdentifier=' /tmp/popmind-framework-signature.txt
          ! grep -qi 'Signature=adhoc' /tmp/popmind-app-signature.txt
          ! grep -qi 'Signature=adhoc' /tmp/popmind-framework-signature.txt
          grep -Eq 'TeamIdentifier=[A-Z0-9]+' /tmp/popmind-app-signature.txt
          grep -Eq 'TeamIdentifier=[A-Z0-9]+' /tmp/popmind-framework-signature.txt
          codesign -d --entitlements :- "dist/mac-arm64/popMind.app/Contents/MacOS/popMind" 2>&1 | grep 'com.apple.security.cs.disable-library-validation'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.signing_mode.outputs.signed == 'true' && matrix.artifact_name || format('{0}-unsigned', matrix.artifact_name) }}
          if-no-files-found: error
          path: |
            dist/*.pkg
            dist/*.zip
            dist/*.yml
            dist/*.yaml
            dist/*.blockmap

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v') && needs.build.outputs.mac_signed == 'true'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-artifacts/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release-artifacts/* --generate-notes --verify-tag
          fi
